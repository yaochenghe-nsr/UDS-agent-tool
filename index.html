<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UDS Pro — 协议解析控制台</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    body { background: #0d1117; font-size: 0.88rem; min-height: 100vh; }

    /* ── Status dots ─────────────────────────────── */
    .dot {
      display: inline-block;
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-green  { background: #2ea043; box-shadow: 0 0 5px #2ea043; }
    .dot-red    { background: #da3633; box-shadow: 0 0 5px #da3633; }
    .dot-yellow { background: #d29922; box-shadow: 0 0 5px #d29922; }

    /* ── Panel cards ─────────────────────────────── */
    .panel { background: #161b22; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; }
    .panel-hd {
      background: #21262d; border-bottom: 1px solid #30363d;
      padding: 9px 14px; font-size: 0.78rem; font-weight: 700;
      color: #8b949e; text-transform: uppercase; letter-spacing: .08em;
      display: flex; align-items: center; justify-content: space-between;
    }

    /* ── Top bar ─────────────────────────────────── */
    #topbar {
      background: #161b22; border-bottom: 1px solid #30363d;
      padding: 8px 20px; display: flex; align-items: center; gap: 16px;
      position: sticky; top: 0; z-index: 100;
    }
    #topbar .brand { font-weight: 700; font-size: 1rem; letter-spacing: .04em; color: #e6edf3; }
    #topbar .brand i { color: #58a6ff; }

    /* ── Segment badge colors ────────────────────── */
    .seg-sid        { background: #1f6feb !important; color: #fff !important; }
    .seg-subfunction{ background: #6e40c9 !important; color: #fff !important; }
    .seg-did        { background: #9e6a03 !important; color: #fff !important; }
    .seg-data       { background: #1a7f37 !important; color: #fff !important; }
    .seg-nrc        { background: #b62324 !important; color: #fff !important; }
    .seg-reserved   { background: #3d444d !important; color: #8b949e !important; }

    /* ── Hex viewer ──────────────────────────────── */
    .hex-viewer { font-family: "Courier New", monospace; line-height: 2; word-break: break-all; }
    .hex-chunk {
      display: inline-block; font-size: 0.82rem; font-weight: 700;
      padding: 3px 8px; border-radius: 4px; margin: 2px; cursor: default;
      letter-spacing: .06em;
    }
    .hex-chunk:hover { filter: brightness(1.2); }

    /* ── Input ───────────────────────────────────── */
    .hex-input {
      font-family: "Courier New", monospace; letter-spacing: .08em; font-size: 1.05rem;
      background: #0d1117 !important; border-color: #30363d !important; color: #e6edf3 !important;
    }
    .hex-input:focus { border-color: #1f6feb !important; box-shadow: 0 0 0 .2rem rgba(31,111,235,.25) !important; }
    .form-select-dark { background-color: #0d1117 !important; border-color: #30363d !important; color: #e6edf3 !important; }

    /* ── History ─────────────────────────────────── */
    .hist-scroll { max-height: 340px; overflow-y: auto; }
    .hist-item {
      padding: 9px 14px; border-bottom: 1px solid #21262d;
      cursor: pointer; transition: background .12s;
    }
    .hist-item:hover { background: #21262d; }
    .hist-item:last-child { border-bottom: none; }
    .hist-raw { font-family: monospace; font-size: .8rem; color: #58a6ff; word-break: break-all; }
    .hist-summary { font-size: .75rem; color: #8b949e; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
    .hist-ts { font-size: .7rem; color: #6e7681; }

    /* ── Badge types ─────────────────────────────── */
    .badge-request  { background: #1f6feb; }
    .badge-positive { background: #1a7f37; }
    .badge-negative { background: #b62324; }
    .badge-unknown  { background: #6e7681; }

    /* ── Result table ────────────────────────────── */
    .res-table td:first-child { color: #8b949e; width: 130px; font-size: .8rem; }
    .res-table td:last-child  { font-family: monospace; color: #e6edf3; }

    /* ── OEM pill ────────────────────────────────── */
    .oem-pill {
      display: inline-flex; align-items: center; gap: 5px;
      background: #21262d; border: 1px solid #30363d;
      border-radius: 20px; padding: 2px 10px 2px 7px; font-size: .75rem;
    }

    /* ── Summary box ─────────────────────────────── */
    .summary-box {
      background: #1c2433; border-left: 3px solid #1f6feb;
      border-radius: 4px; padding: 10px 14px; font-size: .9rem; color: #93c5fd;
    }

    /* ── Legend items ────────────────────────────── */
    .legend-item { font-size: .72rem; color: #8b949e; display: flex; align-items: center; gap: 4px; }

    /* ── File input ──────────────────────────────── */
    .form-control-dark {
      background: #0d1117 !important; border-color: #30363d !important; color: #e6edf3 !important;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #161b22; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  </style>
</head>
<body>

<!-- ── Top Status Bar ──────────────────────────────────────────────────────── -->
<div id="topbar">
  <span class="brand"><i class="bi bi-cpu-fill me-2"></i>UDS Pro Console</span>

  <div class="d-flex align-items-center gap-2">
    <span class="dot dot-red" id="svrDot"></span>
    <span id="svrTxt" class="text-secondary" style="font-size:.8rem;">连接中…</span>
  </div>

  <div id="oemPills" class="d-flex flex-wrap gap-1"></div>

  <div class="ms-auto text-secondary" style="font-size:.75rem;" id="clockEl"></div>
</div>

<!-- ── Main Grid ───────────────────────────────────────────────────────────── -->
<div class="container-fluid py-3 px-4">
  <div class="row g-3">

    <!-- ╔══ LEFT SIDEBAR ══╗ ─────────────────────────────────────────────── -->
    <div class="col-lg-3">

      <!-- History Panel -->
      <div class="panel mb-3">
        <div class="panel-hd">
          <span><i class="bi bi-clock-history me-2"></i>解析历史</span>
          <button class="btn btn-sm btn-outline-secondary py-0 px-2" style="font-size:.7rem;" onclick="clearHistory()">清空</button>
        </div>
        <div class="hist-scroll" id="histList">
          <div class="text-secondary text-center py-4" id="histEmpty" style="font-size:.82rem;">暂无记录</div>
        </div>
      </div>

      <!-- Knowledge Base Status Panel -->
      <div class="panel">
        <div class="panel-hd"><i class="bi bi-database me-2"></i>知识库状态</div>
        <div class="p-3">
          <div class="d-flex align-items-center gap-2 mb-2">
            <span class="dot dot-green"></span>
            <span>内置 DID 定义 <span class="badge bg-secondary ms-1">6 条</span></span>
          </div>
          <div id="kbList">
            <div class="text-secondary" style="font-size:.78rem;">未加载私有知识文件</div>
          </div>
          <div class="mt-3 pt-2 border-top border-secondary" style="font-size:.7rem; color:#6e7681;">
            上传 OEM CSV 后此处显示各厂商 DID 数量
          </div>
        </div>
      </div>

    </div>

    <!-- ╔══ RIGHT MAIN ══╗ ───────────────────────────────────────────────── -->
    <div class="col-lg-9">

      <!-- Control Panel -->
      <div class="panel mb-3">
        <div class="panel-hd"><i class="bi bi-terminal me-2"></i>控制台</div>
        <div class="p-3">

          <div class="row g-3 align-items-end">
            <div class="col-md-3">
              <label class="form-label text-secondary mb-1" style="font-size:.78rem;">OEM 知识库</label>
              <select id="oemSel" class="form-select form-select-sm form-select-dark">
                <option value="">— 内置定义 —</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label text-secondary mb-1" style="font-size:.78rem;">十六进制报文</label>
              <input id="rawInput" type="text" class="form-control hex-input"
                placeholder="62F190  |  7F2231  |  1003  |  3E00  |  2703" maxlength="128" />
            </div>
            <div class="col-md-3">
              <button class="btn btn-primary w-100" onclick="doParse()">
                <i class="bi bi-play-fill me-1"></i>解析
              </button>
            </div>
          </div>

          <!-- Quick Examples -->
          <div class="mt-2" style="font-size:.75rem; color:#6e7681;">
            快速示例：
            <span class="text-primary" style="cursor:pointer;" onclick="setEx('62F190')">62F190</span>
            <span class="text-primary" style="cursor:pointer;" onclick="setEx('7F2231')">7F2231</span>
            <span class="text-primary" style="cursor:pointer;" onclick="setEx('1003')">1003</span>
            <span class="text-primary" style="cursor:pointer;" onclick="setEx('5001001901F4')">5001…</span>
            <span class="text-primary" style="cursor:pointer;" onclick="setEx('3E80')">3E80</span>
            <span class="text-primary" style="cursor:pointer;" onclick="setEx('2703')">2703</span>
            <span class="text-primary" style="cursor:pointer;" onclick="setEx('1101')">1101</span>
            <span class="text-primary" style="cursor:pointer;" onclick="setEx('2801')">2801</span>
          </div>

          <hr class="border-secondary my-3" />

          <!-- OEM Upload -->
          <div class="row g-2 align-items-end">
            <div class="col">
              <label class="form-label text-secondary mb-1" style="font-size:.78rem;">
                <i class="bi bi-upload me-1"></i>上传 OEM DID 知识文件
                <span class="text-secondary ms-1" style="font-size:.7rem;">（CSV 格式：did,name）</span>
              </label>
              <input type="file" id="csvFile" accept=".csv" class="form-control form-control-sm form-control-dark" />
            </div>
            <div class="col-auto">
              <button class="btn btn-sm btn-outline-info" onclick="uploadOEM()">
                <i class="bi bi-cloud-upload me-1"></i>上传
              </button>
            </div>
          </div>
          <div id="uploadMsg" class="mt-2" style="display:none;"></div>

        </div>
      </div>

      <!-- Error Alert -->
      <div id="errBox" class="alert alert-danger py-2 px-3 mb-3" style="display:none; font-size:.85rem;"></div>

      <!-- Results Panel -->
      <div class="panel" id="resPanel" style="display:none;">
        <div class="panel-hd">
          <span><i class="bi bi-table me-2"></i>解析结果</span>
          <div class="d-flex gap-2 align-items-center">
            <span id="typeBadge" class="badge">—</span>
            <button class="btn btn-sm btn-outline-secondary py-0 px-2" style="font-size:.72rem;" onclick="exportLog()">
              <i class="bi bi-download me-1"></i>导出日志
            </button>
          </div>
        </div>
        <div class="p-3">

          <!-- Hex Segment Viewer -->
          <div class="mb-3">
            <div class="text-secondary mb-2" style="font-size:.72rem; text-transform:uppercase; letter-spacing:.06em;">
              报文分段高亮
            </div>
            <div id="hexView" class="hex-viewer mb-2"></div>
            <div class="d-flex flex-wrap gap-3 mt-1">
              <span class="legend-item"><span class="badge seg-sid">SID</span>服务标识符</span>
              <span class="legend-item"><span class="badge seg-subfunction">SUB</span>子功能/类型</span>
              <span class="legend-item"><span class="badge seg-did">DID</span>数据标识符</span>
              <span class="legend-item"><span class="badge seg-data">DATA</span>数据值</span>
              <span class="legend-item"><span class="badge seg-nrc">NRC</span>否定响应码</span>
            </div>
          </div>

          <hr class="border-secondary" />

          <!-- Detail Table -->
          <table class="table table-sm table-borderless res-table mb-0">
            <tbody id="resTbody"></tbody>
          </table>

          <!-- Summary -->
          <div class="summary-box mt-3" id="sumBox"></div>

        </div>
      </div>

    </div><!-- /col-lg-9 -->
  </div><!-- /row -->
</div><!-- /container -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ── Constants ──────────────────────────────────────────────────────────────
const SEG_CLS = { sid:"seg-sid", subfunction:"seg-subfunction", did:"seg-did", data:"seg-data", nrc:"seg-nrc", reserved:"seg-reserved" };
const TYPE_META = {
  request:  { cls:"badge-request",  label:"请求"   },
  positive: { cls:"badge-positive", label:"肯定响应"},
  negative: { cls:"badge-negative", label:"否定响应"},
  unknown:  { cls:"badge-unknown",  label:"未知"   },
};
const HIST_KEY = "uds_history_v2";
let currentResult = null;

// ── Clock ──────────────────────────────────────────────────────────────────
setInterval(() => {
  document.getElementById("clockEl").textContent =
    new Date().toLocaleTimeString("zh-CN", { hour12: false });
}, 1000);

// ── Health Check ───────────────────────────────────────────────────────────
async function checkHealth() {
  try {
    const d = await fetch("/health").then(r => r.json());
    document.getElementById("svrDot").className = "dot dot-green";
    document.getElementById("svrTxt").textContent = "后端在线";
    document.getElementById("svrTxt").className = "text-success";
    renderOEMPills(d.oem_configs);
    renderKBList(d.oem_configs);
  } catch {
    document.getElementById("svrDot").className = "dot dot-red";
    document.getElementById("svrTxt").textContent = "后端离线";
    document.getElementById("svrTxt").className = "text-danger";
  }
}
setInterval(checkHealth, 5000);
checkHealth();

function renderOEMPills(configs) {
  const el = document.getElementById("oemPills");
  if (!configs.length) { el.innerHTML = ""; return; }
  el.innerHTML = configs.map(c =>
    `<span class="oem-pill"><span class="dot dot-green"></span>${c.name} <span class="badge bg-secondary ms-1">${c.count}</span></span>`
  ).join("");
}

function renderKBList(configs) {
  const el = document.getElementById("kbList");
  if (!configs.length) {
    el.innerHTML = `<div class="text-secondary" style="font-size:.78rem;">未加载私有知识文件</div>`;
    return;
  }
  el.innerHTML = configs.map(c =>
    `<div class="d-flex align-items-center gap-2 mb-1">
       <span class="dot dot-green"></span>
       <span>${c.name} <span class="badge bg-secondary ms-1">${c.count} 条</span></span>
     </div>`
  ).join("");
}

// ── OEM List ───────────────────────────────────────────────────────────────
async function loadOEMList() {
  try {
    const d = await fetch("/oem_configs").then(r => r.json());
    const sel = document.getElementById("oemSel");
    const cur = sel.value;
    sel.innerHTML = '<option value="">— 内置定义 —</option>';
    d.configs.forEach(name => {
      const o = document.createElement("option");
      o.value = o.textContent = name;
      sel.appendChild(o);
    });
    if (cur) sel.value = cur;
  } catch {}
}

// ── OEM Upload ─────────────────────────────────────────────────────────────
async function uploadOEM() {
  const fi = document.getElementById("csvFile");
  if (!fi.files.length) { showMsg("请先选择一个 CSV 文件", "danger"); return; }
  const fd = new FormData();
  fd.append("file", fi.files[0]);
  try {
    const resp = await fetch("/oem_configs/upload", { method: "POST", body: fd });
    const d = await resp.json();
    if (!resp.ok) { showMsg("上传失败：" + (d.detail || resp.statusText), "danger"); return; }
    showMsg(d.message, "success");
    fi.value = "";
    await loadOEMList();
    await checkHealth();
    const m = d.message.match(/OEM 配置：(\S+)，/);
    if (m) document.getElementById("oemSel").value = m[1];
  } catch (e) { showMsg("请求失败：" + e.message, "danger"); }
}

function showMsg(txt, type) {
  const el = document.getElementById("uploadMsg");
  el.className = `alert alert-${type} py-1 px-3 mb-0`;
  el.textContent = txt;
  el.style.display = "block";
}

// ── Parse ──────────────────────────────────────────────────────────────────
function setEx(v) { document.getElementById("rawInput").value = v; }

async function doParse() {
  const raw = document.getElementById("rawInput").value.trim();
  const oem = document.getElementById("oemSel").value;
  const errBox  = document.getElementById("errBox");
  const resPanel = document.getElementById("resPanel");

  errBox.style.display = "none";
  resPanel.style.display = "none";

  if (!raw) { errBox.textContent = "请输入报文数据"; errBox.style.display = "block"; return; }

  try {
    const body = { data: raw };
    if (oem) body.oem = oem;
    const resp = await fetch("/parse", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    if (!resp.ok) {
      const err = await resp.json();
      errBox.textContent = "解析错误：" + (err.detail || resp.statusText);
      errBox.style.display = "block";
      return;
    }
    const data = await resp.json();
    currentResult = data;
    renderResult(data, oem);
    addHistory(data, oem);
    resPanel.style.display = "block";
  } catch (e) {
    errBox.textContent = "请求失败：" + e.message;
    errBox.style.display = "block";
  }
}

// ── Render Result ──────────────────────────────────────────────────────────
function fmtHex(h) { return (h.match(/.{1,2}/g) || []).join(" "); }

function renderResult(d, oem) {
  // Hex viewer
  document.getElementById("hexView").innerHTML = d.segments.map(s => {
    const cls = SEG_CLS[s.role] || "seg-reserved";
    return `<span class="hex-chunk badge ${cls}" title="${escHtml(s.label + ': ' + s.meaning)}">${fmtHex(s.hex_val).toUpperCase()}</span>`;
  }).join("");

  // Type badge
  const meta = TYPE_META[d.response_type] || TYPE_META.unknown;
  const badge = document.getElementById("typeBadge");
  badge.className = `badge ${meta.cls}`;
  badge.textContent = meta.label;

  // Table rows
  const rows = [
    ["原始报文",  fmtHex(d.raw).toUpperCase()],
    ["服务 ID",   `0x${d.service_id}`],
    ["服务名称",  d.service_name],
    ["服务描述",  d.service_cn],
    ["响应类型",  meta.label],
  ];
  d.segments.forEach(s => {
    if (s.role !== "sid") rows.push([s.label, `0x${s.hex_val.toUpperCase()} — ${s.meaning}`]);
  });
  rows.push(["使用配置", oem || "内置"]);

  document.getElementById("resTbody").innerHTML = rows.map(
    ([k, v]) => `<tr><td class="pe-3">${escHtml(k)}</td><td>${escHtml(v)}</td></tr>`
  ).join("");

  document.getElementById("sumBox").textContent = d.summary;
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── History ────────────────────────────────────────────────────────────────
function loadHist()  { try { return JSON.parse(localStorage.getItem(HIST_KEY)) || []; } catch { return []; } }
function saveHist(h) { localStorage.setItem(HIST_KEY, JSON.stringify(h.slice(0, 60))); }

function addHistory(d, oem) {
  const h = loadHist();
  h.unshift({ raw: d.raw, summary: d.summary, type: d.response_type, oem: oem || "", ts: new Date().toLocaleTimeString("zh-CN", {hour12:false}) });
  saveHist(h);
  renderHistory();
}

function renderHistory() {
  const h = loadHist();
  const list = document.getElementById("histList");
  const empty = document.getElementById("histEmpty");
  list.querySelectorAll(".hist-item").forEach(el => el.remove());
  if (!h.length) { empty.style.display = "block"; return; }
  empty.style.display = "none";
  h.forEach(item => {
    const meta = TYPE_META[item.type] || TYPE_META.unknown;
    const div = document.createElement("div");
    div.className = "hist-item";
    div.innerHTML = `
      <div class="d-flex justify-content-between align-items-start gap-1">
        <span class="hist-raw">${fmtHex(item.raw).toUpperCase()}</span>
        <span class="badge ${meta.cls}" style="font-size:.6rem; flex-shrink:0;">${meta.label}</span>
      </div>
      <div class="hist-summary mt-1">${escHtml(item.summary)}</div>
      <div class="d-flex justify-content-between mt-1">
        <span class="hist-ts">${item.ts}</span>
        ${item.oem ? `<span class="hist-ts">${escHtml(item.oem)}</span>` : ""}
      </div>`;
    div.addEventListener("click", () => {
      document.getElementById("rawInput").value = item.raw;
      if (item.oem) document.getElementById("oemSel").value = item.oem;
      doParse();
    });
    list.appendChild(div);
  });
}

function clearHistory() { localStorage.removeItem(HIST_KEY); renderHistory(); }

// ── Export Log ─────────────────────────────────────────────────────────────
function exportLog() {
  if (!currentResult) return;
  const d = currentResult;
  const oem = document.getElementById("oemSel").value || "内置";
  const pad = (s, n) => s.padEnd(n);
  const lines = [
    "╔═══════════════════════════════════════════════════════════╗",
    "║              UDS Pro — 解析报告                           ║",
    `║  时间：${new Date().toLocaleString("zh-CN").padEnd(48)}║`,
    "╠═══════════════════════════════════════════════════════════╣",
    `  原始报文  : ${fmtHex(d.raw).toUpperCase()}`,
    `  服务 ID   : 0x${d.service_id}`,
    `  服务名称  : ${d.service_name} (${d.service_cn})`,
    `  响应类型  : ${d.response_type}`,
    `  使用配置  : ${oem}`,
    "",
    "── 分段详情 ─────────────────────────────────────────────────",
    ...d.segments.map(s =>
      `  [${pad(s.role.toUpperCase(), 12)}] 0x${pad(s.hex_val.toUpperCase(), 16)}  ${s.label}: ${s.meaning}`
    ),
    "",
    "── 摘要 ─────────────────────────────────────────────────────",
    `  ${d.summary}`,
    "╚═══════════════════════════════════════════════════════════╝",
  ];
  const blob = new Blob([lines.join("\n")], { type: "text/plain;charset=utf-8" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `uds_${d.raw}_${Date.now()}.txt`;
  a.click();
}

// ── Init ───────────────────────────────────────────────────────────────────
document.getElementById("rawInput").addEventListener("keydown", e => { if (e.key === "Enter") doParse(); });
loadOEMList();
renderHistory();
</script>
</body>
</html>
